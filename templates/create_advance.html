<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Advance beantragen</title>
    <style>
        body { font-family: Arial, sans-serif; background:#e8edf2; margin:0; padding:30px; }
        .header { background:#1b2d42; color:white; padding:24px; border-radius:12px; margin-bottom:20px; }
        .header a { color:#7fb3d3; font-weight:bold; text-decoration:none; margin-right:16px; }
        .card { background:white; padding:24px; border-radius:12px; border:1px solid #c8d0da; max-width:900px; margin-bottom:20px; }
        .grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
        label { display:block; margin-top:12px; font-weight:bold; }
        input, textarea, select { width:100%; padding:10px; margin-top:6px; border:1px solid #b0bbc8; border-radius:8px; box-sizing:border-box; }
        textarea { min-height:120px; }
        button { margin-top:20px; padding:12px 18px; background:#1a5276; color:white; border:0; border-radius:8px; font-weight:bold; cursor:pointer; }
        .muted { color:#666; font-size:14px; }
    </style>
</head>
<body>

<div class="header">
    <h1>Advance beantragen</h1>
    <p>Vorschuss beantragen, bevor Rechnungen vorhanden sind.</p>
    <a href="/">← Dashboard</a>
</div>

<form method="post" action="/create-advance">

<div class="card">
    <h2>Allgemeine Angaben</h2>

    <div class="grid">
        <div>
            <label>Name Antragsteller</label>
            <input type="text" name="name" required>
        </div>

        <div>
            <label>ID Antragsteller</label>
            <input type="text" name="member_id">
        </div>

        <div>
            <label>Telefon</label>
            <input type="text" name="phone">
        </div>

        <div>
            <label>Abteilung / Majlis / Region</label>
            <input type="text" name="department">
        </div>

        <div>
            <label>Benötigter Advance Betrag</label>
            <input type="text" name="advance_amount" required placeholder="z.B. 2.000,00">
        </div>

        <div>
            <label>Datum</label>
            <input type="text" name="date" placeholder="z.B. 11.05.2026">
        </div>
    </div>

    <label>Zweck / wofür wird der Advance benötigt?</label>
    <textarea name="purpose" required placeholder="z.B. Teller für Ijtema, Hospitality, Transport..."></textarea>

    <p class="muted">
        Hinweis: Dieser Antrag ist noch kein finaler Voucher. Die Rechnungen müssen später nachgereicht werden.
    </p>

    <label>
        <input type="checkbox" name="confirm" required style="width:auto;">
        Ich bestätige, dass ich den Advance später mit Rechnungen abrechnen werde.
    </label>

    <button type="submit">Advance beantragen</button>
</div>

</form>

</body>
</html>
