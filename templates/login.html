<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body { font-family: Arial, sans-serif; background:#e8edf2; margin:0; padding:30px; }
        .card { background:white; max-width:420px; margin:80px auto; padding:28px; border-radius:12px; border:1px solid #c8d0da; }
        h1 { color:#1b2d42; }
        input { width:100%; padding:10px; margin-top:8px; margin-bottom:16px; border:1px solid #b0bbc8; border-radius:8px; box-sizing:border-box; }
        button { background:#1a5276; color:white; padding:12px 18px; border:0; border-radius:8px; font-weight:bold; cursor:pointer; width:100%; }
        .error { color:#c0392b; font-weight:bold; }
    </style>
</head>
<body>

<div class="card">
    <h1>Voucher System Login</h1>

    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}

    <form method="post" action="/login">
        <label>Benutzername</label>
        <input type="text" name="username" required>

        <label>Passwort</label>
        <input type="password" name="password" required>

        <button type="submit">Einloggen</button>
    </form>
</div>

</body>
</html>
