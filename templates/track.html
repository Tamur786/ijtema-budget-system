<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Voucher Status prüfen</title>
    <style>
        body { font-family: Arial, sans-serif; background:#e8edf2; margin:0; padding:30px; }
        .header { background:#1b2d42; color:white; padding:20px; border-radius:12px; margin-bottom:20px; }
        .card { background:white; padding:24px; border-radius:12px; border:1px solid #c8d0da; max-width:700px; }
        label { display:block; margin-top:14px; font-weight:bold; }
        input { width:100%; padding:10px; margin-top:6px; border:1px solid #b0bbc8; border-radius:8px; box-sizing:border-box; }
        button { margin-top:20px; padding:12px 18px; background:#1a5276; color:white; border:0; border-radius:8px; font-weight:bold; cursor:pointer; }
        .error { color:#c0392b; font-weight:bold; }
        .status { font-size:24px; font-weight:bold; color:#1a5276; }
        a { color:#7fb3d3; font-weight:bold; text-decoration:none; }
    </style>
</head>
<body>

<div class="header">
    <h1>Voucher Status prüfen</h1>
    <a href="/">← Dashboard</a>
</div>

<div class="card">
    <form method="post" action="/track">
        <label>Voucher-Code</label>
        <input type="text" name="code" placeholder="z.B. V-2026-0001" required>

        <label>Name Antragsteller</label>
        <input type="text" name="name" required>

        <button type="submit">Status suchen</button>
    </form>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    {% if voucher %}
        <hr>
        <h2>{{ voucher.code }}</h2>
        <p>Status:</p>
        <div class="status">{{ voucher.status }}</div>

        <p>Abteilung: <b>{{ voucher.department }}</b></p>
        <p>Zweck: <b>{{ voucher.purpose }}</b></p>
        <p>Betrag: <b>{{ voucher.amount }} €</b></p>
    {% endif %}
</div>

</body>
</html>
